name: keep-warm

# GitHub Actions as the primary keep-warm scheduler.
#
# Why this beats a self-hosted scheduler on Render free tier:
#   - Runs on GitHub's infrastructure — immune to Render instance sleep.
#   - Zero additional Render hours consumed.
#   - Public repos: unlimited minutes. Private repos: 2000 min/month
#     (~3600 runs × 0.5 min ≈ 1800 min — just within limit).
#
# Cron fires at minutes 7, 19, 31, 43, 55 of every hour (~12-min cadence).
# Avoiding :00 and :30 prevents overlap with other scheduled workflows
# and reduces the chance of hitting GitHub's queuing delays.
#
# Render free-tier sleep timeout: 15 minutes of no inbound HTTP traffic.
# A 12-minute cadence provides a 3-minute safety margin.

on:
  schedule:
    - cron: "7,19,31,43,55 * * * *"
  workflow_dispatch:    # manual trigger for testing

jobs:
  ping:
    name: Ping backend health
    runs-on: ubuntu-latest
    timeout-minutes: 2   # abort if Render is unresponsive beyond cold-start window

    steps:
      - name: Ping /health
        env:
          TARGET: https://spotify-resonance.onrender.com/health
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s -w "\n%{http_code}\n%{time_total}" \
            --max-time 35 \
            --retry 2 \
            --retry-delay 5 \
            --retry-connrefused \
            "$TARGET" 2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -2 | head -1)
          LATENCY=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "status=${HTTP_CODE} latency=${LATENCY}s body=${BODY}"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Health check failed — HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Health check passed (HTTP $HTTP_CODE, ${LATENCY}s)"
